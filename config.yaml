# Git Repository Tracker Configuration
# Monitoring FedRAMP GitHub Organization Repositories
#
# DOCUMENTATION-FOCUSED CONFIGURATION
# These repositories primarily contain documentation, not code.
# Configuration emphasizes file-level changes and content updates
# over commit volume.
#
# PRIORITY: NEW FILES - Any new documentation files added are ALWAYS reported
#           and highlighted as they indicate new topics/features being documented.
#
# All repositories will be cloned to subdirectories under ./repos/
# relative to this configuration file's location

repositories:
  - name: "docs"
    url: "https://github.com/FedRAMP/docs"
    path: "./repos/docs"
    primary_branch: "main"
    critical_files:
      - "README.md"
      - "**/*.md"                # All markdown files
      - "**/*.mdx"               # MDX files if using
      - "_config.yml"            # Jekyll/site configuration
      - "mkdocs.yml"             # MkDocs configuration
      - "docusaurus.config.js"   # Docusaurus configuration
      - "SUMMARY.md"             # GitBook-style navigation
      - "_sidebar.md"            # Sidebar navigation
      - "package.json"           # Build dependencies
      - ".github/workflows/*"    # Documentation build/deploy

  - name: "roadmap"
    url: "https://github.com/FedRAMP/roadmap"
    path: "./repos/roadmap"
    primary_branch: "main"
    critical_files:
      - "README.md"
      - "**/*.md"                # All roadmap documentation
      - ".github/workflows/*"

  - name: "community"
    url: "https://github.com/FedRAMP/community"
    path: "./repos/community"
    primary_branch: "main"
    critical_files:
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "**/*.md"                # All community documentation
      - ".github/ISSUE_TEMPLATE/*"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/*"

    # GitHub Discussions tracking (community engagement)
    track_discussions: true
    discussions_url: "https://github.com/FedRAMP/community/discussions"
    discussions_config:
      # High-level channel groupings for FedRAMP discussions
      channels:
        20x:
          labels: ["20x", "FedRAMP 2.0", "modernization"]
          keywords: ["20x", "FedRAMP 2.0", "automation", "continuous monitoring", "modern cloud"]
          categories: ["20x"]  # If GitHub has a specific 20x category
          enabled: true

        Rev5:
          labels: ["Rev5", "Revision 5", "Rev 5"]
          keywords: ["Rev5", "Rev 5", "Revision 5", "baseline updates", "control updates"]
          categories: ["Rev5"]  # If GitHub has a specific Rev5 category
          enabled: true

        RFCs:
          labels: ["RFC", "Request for Comments"]
          keywords: ["RFC:", "[RFC]"]
          categories: ["RFC", "RFCs"]
          enabled: true

      # General tracking settings
      include_answered: true     # Include answered discussions in reports
      include_closed: false      # Exclude closed discussions from active reports
      max_age_days: 90           # Only track discussions from last 90 days
      min_reactions: 0           # Minimum reactions to include (0 = all)
      track_comments: true       # Track comment activity
      max_comments_shown: 5      # Max comments to show per discussion in reports

      # Aging thresholds for alerts
      unanswered_alert_hours: 48  # Alert if question unanswered for >48 hours
      high_engagement_threshold: 10  # Comments count to consider "high engagement"

# Daily report configuration
daily_report:
  enabled: true
  time: "09:00"  # Time to generate daily report (24-hour format)
  output_directory: "./reports/daily"  # Where to save daily reports

  # Thresholds for determining "big changes" (optimized for documentation repos)
  thresholds:
    min_commits: 3           # Report if more than 3 commits (docs have fewer commits)
    min_lines_changed: 100   # Report if more than 100 lines in single file
    min_files_changed: 5     # Report if more than 5 files modified

  # Documentation-specific triggers (ALWAYS report these regardless of thresholds)
  always_report:
    - new_files_added        # ANY new files - CRITICAL for tracking new documentation
    - files_deleted          # Any deleted files - indicates deprecated content
    - files_renamed          # Any renamed/moved files - indicates reorganization
    - critical_files_changed # Changes to navigation, config, or structure files

# Weekly report configuration
weekly_report:
  enabled: true
  day: "Monday"            # Day of week to generate report
  time: "09:00"            # Time to generate weekly report (24-hour format)
  output_directory: "./reports/weekly"  # Where to save weekly reports

  # Weekly reports cover the previous 7 days
  lookback_days: 7

  # Show top N most active files
  top_files_count: 10

  # Include day-by-day breakdown with links to daily reports
  include_daily_breakdown: true

  # Weekly-specific content
  include_contributor_stats: true     # Show contributor activity summary
  include_commit_timeline: true       # Show commits by day of week
  group_by_repository: true           # Organize by repository
  show_most_active_files: true        # Highlight files with most changes

# GitHub Discussions report configuration
discussions_reports:
  enabled: true

  # Daily discussions report
  daily:
    enabled: true
    time: "09:00"  # Time to generate daily discussions report
    output_directory: "./reports/discussions/daily"  # Where to save daily discussions reports

    # What to include in daily reports
    show_new_discussions: true          # New discussions created today
    show_active_discussions: true       # Discussions with activity today
    show_answered_discussions: true     # Questions answered today
    show_aging_unanswered: true         # Unanswered questions >48 hours old
    group_by_channel: true              # Group by 20x, Rev5, RFCs

    # AI interpretation settings
    enable_ai_interpretation: true      # Include AI analysis in reports
    interpret_themes: true              # Identify common themes per channel
    interpret_sentiment: true           # Assess community sentiment
    interpret_urgency: true             # Flag urgent or blocking issues
    interpret_patterns: true            # Identify recurring questions

  # Weekly discussions report
  weekly:
    enabled: true
    day: "Monday"  # Day of week to generate report
    time: "09:00"  # Time to generate weekly discussions report
    output_directory: "./reports/discussions/weekly"  # Where to save weekly discussions reports

    # What to include in weekly reports
    show_metrics_summary: true          # Overall metrics and trends
    show_top_discussions: true          # Most engaged discussions
    show_channel_breakdown: true        # Detailed breakdown per channel
    show_cross_channel_analysis: true   # Themes spanning channels
    show_health_indicators: true        # Community health assessment
    show_actionable_insights: true      # Recommendations and action items
    top_discussions_count: 5            # How many top discussions to show per channel

    # AI interpretation settings
    enable_ai_interpretation: true      # Include AI analysis in reports
    interpret_themes: true              # Identify themes and patterns
    interpret_sentiment: true           # Community sentiment analysis
    interpret_trends: true              # Week-over-week trends
    interpret_health: true              # Community health assessment
    provide_recommendations: true       # Suggest actions for community managers

# Update frequency
polling:
  interval_minutes: 60  # Check repositories every 60 minutes
  fetch_on_poll: true   # Run 'git fetch' to get latest changes

  # GitHub Discussions polling (when enabled for a repository)
  discussions_interval_minutes: 60  # Check for new discussions every 60 minutes
  discussions_update_interval_hours: 6  # Update existing discussions every 6 hours

# GitHub API configuration
github_api:
  # Authentication (optional but recommended for higher rate limits)
  # Without token: 60 requests/hour
  # With token: 5,000 requests/hour
  # Set via environment variable: GITHUB_TOKEN or provide here
  token: "${GITHUB_TOKEN}"  # Read from environment variable

  # Rate limit handling
  respect_rate_limits: true  # Pause when approaching rate limit
  rate_limit_buffer: 100     # Stop when this many requests remain

  # Cache settings for discussions
  cache_discussions: true    # Cache discussions data to minimize API calls
  cache_duration_hours: 6    # How long to cache discussion data

# Output configuration
output:
  format: "markdown"
  output_directory: "./reports"  # Root reports directory (contains daily/ and weekly/ subdirs)
  include_diffs: false      # Set to true to include full diffs in reports (can be verbose)
  max_commits_shown: 50     # Maximum number of commits to show in detail
  truncate_long_messages: true  # Truncate commit messages longer than 200 chars

  # Report file naming
  daily_filename_format: "YYYY-MM-DD.md"     # e.g., 2026-03-23.md
  weekly_filename_format: "YYYY-Www.md"      # e.g., 2026-W12.md (ISO week number)

  # New file reporting (CRITICAL for documentation tracking)
  highlight_new_files: true  # Visually highlight new files in reports
  show_new_file_content_preview: false  # Set to true to include first few lines of new files
  list_new_files_first: true  # Always list new files at top of reports

  # Report generation options
  generate_empty_reports: true   # Create "No changes" report if no activity
  link_daily_reports_in_weekly: true  # Include links to daily reports in weekly summary

# Reporting preferences (optimized for documentation tracking)
reporting:
  # Primary focus: file changes over commit volume
  prioritize_file_changes: true

  # Show detailed file-level changes (what files, how much changed)
  show_file_stats: true
  show_file_diffs_summary: true  # Brief summary of what changed in each file

  # Group by file rather than by author for documentation
  group_by_file: true
  group_by_author: false

  # Include structural changes
  show_branch_activity: true
  show_tags: true
  show_file_additions_deletions: true  # Highlight new/removed docs

  # Documentation-specific reporting
  highlight_new_content: true     # Emphasize new documentation added
  track_content_reorganization: true  # Note when files are moved/renamed

  # AI Interpretation (NEW CAPABILITY)
  enable_ai_interpretation: true  # Allow AI to interpret content when beneficial
  ai_interpretation_in_reports: true  # Include AI interpretation in daily/weekly reports
  ai_interpretation_prefix: "🤖 AI INTERPRETATION:"  # Prefix to clearly label AI analysis

  # When to include AI interpretation in automated reports
  auto_interpret_new_files: true      # Interpret what new documentation covers
  auto_interpret_large_changes: true  # Interpret files with >200 line changes
  auto_interpret_restructuring: true  # Interpret apparent purpose of reorganizations

  # GitHub Discussions Reporting (when enabled)
  include_discussions_in_reports: true  # Include discussions activity in daily/weekly reports
  discussions_prefix: "💬 GITHUB DISCUSSIONS:"  # Prefix to clearly label discussions data
  discussions_in_daily_reports: true    # Show new/active discussions in daily reports
  discussions_in_weekly_reports: true   # Show discussions summary in weekly reports

  # What to show in discussions reports
  show_new_discussions: true            # New discussions created
  show_active_discussions: true         # Discussions with recent comments
  show_answered_discussions: true       # Questions that were answered
  show_unanswered_questions: true       # Open questions needing answers
  show_top_discussions: true            # Most engaged discussions (reactions/comments)
  top_discussions_count: 5              # How many top discussions to show

# Excluded files/patterns (don't report changes to these in daily reports)
# These are still tracked but won't trigger "big change" alerts
excluded_patterns:
  - "package-lock.json"  # Lock files (less relevant for docs)
  - "yarn.lock"
  - "Gemfile.lock"
  - "*.min.js"           # Minified assets
  - "*.min.css"
  - "dist/*"             # Build output
  - "build/*"            # Build artifacts
  - "_site/*"            # Jekyll build output
  - ".docusaurus/*"      # Docusaurus cache
  - "node_modules/*"     # Dependencies
  - ".cache/*"           # Cache directories

# Repository storage location
storage:
  repos_directory: "./repos"  # Where repositories will be cloned (relative to this file)
                               # "./repos" = visible "repos" directory (NOT hidden)
                               # A hidden directory would be ".repos" (starting with dot)

# IMPORTANT: Setup instructions
# All paths are relative to the location of this config file.
# You can place this entire directory anywhere on any system.
#
# The tool will automatically:
# 1. Create ./repos/ directory if it doesn't exist
# 2. Clone repositories to ./repos/[repo-name]/ if not already present
# 3. Run 'git fetch' on existing repositories to get updates
# 4. Create ./reports/daily/, ./reports/weekly/, and ./reports/discussions/ directories
# 5. Generate daily reports at configured time (default: 09:00)
# 6. Generate weekly reports on configured day (default: Monday 09:00)
# 7. Generate daily and weekly discussions reports (grouped by 20x, Rev5, RFCs)

# Manual setup (optional - tool will do this automatically):
# cd [directory-containing-this-file]
# mkdir -p repos reports/daily reports/weekly reports/discussions/daily reports/discussions/weekly
# cd repos
# git clone https://github.com/FedRAMP/docs
# git clone https://github.com/FedRAMP/roadmap
# git clone https://github.com/FedRAMP/community

# Prerequisites:
# - Git must be installed and accessible in PATH
# - Network access to clone from GitHub (repositories are public)
